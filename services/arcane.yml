# Mot de passe initial pour Arcane: arcane / arcane-admin
# openssl rand -base64 32   # ENCRYPTION_KEY
# openssl rand -base64 32   # JWT_SECRET

services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    ports:
      - '${ARCANE_PORT}:3552'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../volumes/arcane-data:/app/data
    environment:
      - APP_URL=http://localhost:3552
      - PUID=1000
      - PGID=1000
      - ENCRYPTION_KEY=825dd37b13fe601dc28af12472350b7abdbaab5b9e4e15fbf47461854472cd5f
      - JWT_SECRET=3ec714325768da4d4312ffac9099d404f6e273228d2e15d01579c04c36269ef0
    #restart: on-failure
