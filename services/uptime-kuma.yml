# =========================================================================
# Uptime Kuma - Surveillance de l'état des services
# -------------------------------------------------------------------------
# Pour Portainer, il faut écouter sur le port 9000
# =========================================================================
# Note: Pour configurer le widget Uptime Kuma dans le tableau de bord,
# Il faudra créer un groupe de statuts et une page de statuts dans Uptime Kuma.
# et utiliser le "slug" de la page de statuts dans le fichier init-dashboard.yml
# slug: page-de-statuts 
# Voir la documentation à 
# https://gethomepage.dev/widgets/services/uptime-kuma/


services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    volumes:
      - ../volumes/uptimekuma-data:/app/data
    ports:
      # <Host Port>:<Container Port>
      - "${UPTIMEKUMA_PORT}:3001"
